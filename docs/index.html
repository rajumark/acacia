<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Acacia — Optimizer</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --blue: #4285F4;
    --green: #34A853;
    --yellow: #FBBC04;
    --red: #EA4335;
    --bg: #ffffff;
    --code-bg: #f8fafc;
    --text-main: #0f172a;
    --text-muted: #64748b;
    --border: #e2e8f0;
    --mono: 'JetBrains Mono', 'Fira Code', ui-monospace, monospace;
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Inter", "Segoe UI", Roboto, sans-serif;
    background-color: var(--bg);
    background-image: radial-gradient(#e2e8f0 1px, transparent 1px);
    background-size: 32px 32px;
    color: var(--text-main);
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    padding: 24px;
    overflow: hidden;
  }

  /* Branding Header */
  .brand-header {
    position: absolute;
    top: 40px;
    left: 40px;
    z-index: 100;
  }

  .brand-header h1 {
    font-size: 28px;
    letter-spacing: -1.5px;
    font-weight: 800;
    margin: 0;
    user-select: none;
  }

  .brand-header h1 span { color: var(--blue); }

  /* Scissors Animation */
  #scissors {
    position: fixed;
    pointer-events: none;
    z-index: 200;
    font-size: 32px;
    transition: all 0.25s cubic-bezier(0.18, 0.89, 0.32, 1.28);
    opacity: 0;
    transform: translate(-50%, -50%) rotate(-45deg);
    display: flex;
    align-items: center;
    justify-content: center;
    filter: drop-shadow(0 4px 8px rgba(0,0,0,0.1));
  }

  #scissors.active {
    opacity: 1;
    animation: snip 0.2s ease infinite;
  }

  @keyframes snip {
    0%, 100% { transform: translate(-50%, -50%) rotate(-45deg) scale(1); }
    50% { transform: translate(-50%, -50%) rotate(-45deg) scale(1.3) rotateX(30deg); }
  }

  /* Token Badge (Persistent) */
  .token-badge {
    display: inline-flex;
    align-items: center;
    background: var(--green);
    color: white;
    padding: 2px 8px;
    border-radius: 6px;
    font-size: 10px;
    font-weight: 800;
    margin-left: 12px;
    vertical-align: middle;
    opacity: 0;
    transform: scale(0.5);
    transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
  }

  .token-badge.visible {
    opacity: 1;
    transform: scale(1);
  }

  .main-stage {
    width: 100%;
    max-width: 800px;
    position: relative;
  }

  /* Code Panel */
  .panel {
    background: var(--code-bg);
    border: 1px solid var(--border);
    border-radius: 32px;
    padding: 64px;
    position: relative;
    box-shadow: 0 30px 60px -12px rgba(0, 0, 0, 0.1);
    min-height: 500px;
    display: flex;
    flex-direction: column;
    justify-content: center;
  }

  .code {
    font-family: var(--mono);
    font-size: 18px;
    line-height: 2.4;
    white-space: pre;
    color: var(--text-muted);
  }

  .line-container {
    display: flex;
    align-items: center;
    flex-wrap: nowrap;
  }

  .h-light {
    display: inline-block;
    padding: 0 4px;
    border-radius: 4px;
    transition: all 0.3s ease;
    font-weight: 600;
    position: relative;
  }

  .h-active {
    background: #ffffff;
    box-shadow: 0 4px 12px rgba(66, 133, 244, 0.1);
    color: var(--blue) !important;
  }

  .del-char {
    color: var(--red);
    text-decoration: line-through;
    opacity: 1;
    transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    display: inline-block;
  }
  
  .del-char.gone {
    width: 0;
    opacity: 0;
    transform: translateY(-15px) rotate(15deg) scale(0);
  }

  /* Success State */
  .savings-card {
    position: absolute;
    inset: 0;
    background: rgba(255, 255, 255, 0.98);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 50;
    backdrop-filter: blur(12px);
    opacity: 0;
    pointer-events: none;
    transition: all 0.6s ease;
    border-radius: 32px;
    text-align: center;
  }

  .savings-card.show { opacity: 1; pointer-events: auto; }
  .savings-card h2 { font-size: 56px; color: var(--green); font-weight: 900; margin-bottom: 8px; letter-spacing: -2px; }

  .replay-btn {
    margin-top: 32px;
    border: none;
    background: var(--text-main);
    color: white;
    padding: 16px 36px;
    border-radius: 100px;
    cursor: pointer;
    font-weight: 700;
    font-size: 14px;
    transition: all 0.2s;
  }

  .replay-btn:hover { transform: translateY(-2px); background: black; box-shadow: 0 8px 20px rgba(0,0,0,0.1); }

  @media (max-width: 640px) {
    .panel { padding: 40px 24px; border-radius: 20px; }
    .code { font-size: 14px; }
    .brand-header { top: 20px; left: 20px; }
  }
</style>
</head>
<body>

<div id="scissors">✂️</div>

<header class="brand-header">
  <h1>Acacia<span>.</span></h1>
</header>

<main class="main-stage">
  <div class="panel">
    <div class="savings-card" id="savingsCard">
      <div style="font-size: 48px; margin-bottom: 16px;">✨</div>
      <h2 id="finalSavings">66% Less Tokens</h2>
      <p style="text-transform: uppercase; font-weight: 700; color: var(--text-muted); letter-spacing: 2px;">Context Pruning Complete</p>
      <button class="replay-btn" onclick="resetAnimation()">OPTIMIZE AGAIN</button>
    </div>

    <div class="code" id="mainCode">
<div class="line-container"><span class="h-light" id="line1">Column</span>(<span id="badge1" class="token-badge"></span></div><div class="line-container">  mod = Mod</div><div class="line-container">    .<span class="h-light" id="line2">fillMaxWidth()</span><span id="badge2" class="token-badge"></span></div><div class="line-container">    .<span class="h-light" id="line3">padding(16.dp)</span><span id="badge3" class="token-badge"></span></div><div class="line-container">    .<span class="h-light" id="line4">clip(Rounded(8))</span><span id="badge4" class="token-badge"></span></div><div class="line-container">    .<span class="h-light" id="line5">background(Surface)</span><span id="badge5" class="token-badge"></span></div><div class="line-container">) {</div><div class="line-container">  <span class="h-light" id="line6">Text</span>("Hello")<span id="badge6" class="token-badge"></span></div><div class="line-container">  <span class="h-light" id="line7">Spacer</span>(Mod.h(8.dp))<span id="badge7" class="token-badge"></span></div><div class="line-container">}</div></div>
  </div>
</main>

<script>
  const mappings = {
    line1: { std: "Column", acc: "Col", cost: 12 },
    line2: { std: "fillMaxWidth()", acc: "fMW()", cost: 24 },
    line3: { std: "padding(16.dp)", acc: "p(16.dp)", cost: 18 },
    line4: { std: "clip(Rounded(8))", acc: "clp(R(8))", cost: 20 },
    line5: { std: "background(Surface)", acc: "bg(Surf)", cost: 22 },
    line6: { std: "Text", acc: "Txt", cost: 10 },
    line7: { std: "Spacer", acc: "Sp", cost: 15 }
  };

  const totalSteps = 7;
  let currentStep = 1;
  let interval;
  let autoReplayTimeout;

  const savingsCard = document.getElementById('savingsCard');
  const scissors = document.getElementById('scissors');

  function moveScissorsTo(element) {
    const rect = element.getBoundingClientRect();
    scissors.style.left = `${rect.left + rect.width / 2}px`;
    scissors.style.top = `${rect.top + rect.height / 2}px`;
    scissors.classList.add('active');
  }

  function transformText(id) {
    const el = document.getElementById(id);
    const stepNum = id.replace('line', '');
    const badge = document.getElementById('badge' + stepNum);
    const config = mappings[id];
    const std = config.std;
    const acc = config.acc;
    
    let html = '';
    for(let char of std) {
      if (!acc.includes(char)) {
        html += `<span class="del-char">${char}</span>`;
      } else {
        html += char;
      }
    }
    el.innerHTML = html;

    setTimeout(() => {
      moveScissorsTo(el);
      
      const chars = el.querySelectorAll('.del-char');
      chars.forEach((c, i) => {
        setTimeout(() => c.classList.add('gone'), i * 40);
      });

      // Show persistent badge
      setTimeout(() => {
        el.innerText = acc;
        badge.innerText = `-${config.cost}`;
        badge.classList.add('visible');
        scissors.classList.remove('active');
      }, 500);
    }, 600);
  }

  function resetAnimation() {
    clearInterval(interval);
    clearTimeout(autoReplayTimeout);
    currentStep = 1;
    savingsCard.classList.remove('show');
    
    // Reset badges
    document.querySelectorAll('.token-badge').forEach(b => {
        b.classList.remove('visible');
        b.innerText = '';
    });
    
    // Reset text
    Object.keys(mappings).forEach(id => {
      document.getElementById(id).innerText = mappings[id].std;
    });

    interval = setInterval(step, 2400);
    step();
  }

  function step() {
    document.querySelectorAll('.h-light').forEach(el => el.classList.remove('h-active'));
    
    if (currentStep > totalSteps) {
      setTimeout(() => {
        savingsCard.classList.add('show');
        autoReplayTimeout = setTimeout(resetAnimation, 6000);
      }, 1000);
      clearInterval(interval);
      return;
    }

    const id = 'line' + currentStep;
    const target = document.getElementById(id);
    if (target) {
        target.classList.add('h-active');
        transformText(id);
    }
    currentStep++;
  }

  // Initial start
  setTimeout(resetAnimation, 500);
</script>

</body>
</html>

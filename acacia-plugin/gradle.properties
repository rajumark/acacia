# Gradle Plugin Portal Configuration
# API Keys loaded from environment variables for security

# Gradle Plugin Portal API Keys (get from https://plugins.gradle.org)
# These are loaded from environment variables: GRADLE_PUBLISH_KEY and GRADLE_PUBLISH_SECRET
# For local testing, you can uncomment and set these, but DO NOT commit actual keys
# gradle.publish.key=your_key_here
# gradle.publish.secret=your_secret_here

org.gradle.jvmargs=-Xmx16g -XX:MaxMetaspaceSize=8g
org.gradle.parallel=true
org.gradle.caching=true

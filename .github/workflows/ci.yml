name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        gradle-version: [ 8.5, 8.7 ]
        java-version: [ 17, 21 ]

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK ${{ matrix.java-version }}
      uses: actions/setup-java@v4
      with:
        java-version: ${{ matrix.java-version }}
        distribution: 'temurin'

    - name: Setup Gradle
      uses: gradle/gradle-build-action@v3
      with:
        gradle-version: ${{ matrix.gradle-version }}

    - name: Grant execute permission for gradlew
      run: chmod +x acacia-plugin/gradlew

    - name: Run unit tests
      working-directory: ./acacia-plugin
      run: ./gradlew :plugin:test --tests "com.acacia.mapping.*" --tests "com.acacia.generator.*"

    - name: Run integration tests
      working-directory: ./acacia-plugin
      run: ./gradlew :plugin:test --tests "com.acacia.integration.*"

    - name: Publish Test Report
      uses: mikepenz/action-junit-report@v4
      if: success() || failure()
      with:
        report_paths: '**/build/test-results/test/TEST-*.xml'

  build:
    runs-on: ubuntu-latest
    needs: test
    
    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Gradle
      uses: gradle/gradle-build-action@v3

    - name: Build plugin
      working-directory: ./acacia-plugin
      run: ./gradlew :plugin:assemble

    - name: Check code style
      working-directory: ./acacia-plugin
      run: ./gradlew :plugin:ktlintCheck || true

  naming-consistency:
    runs-on: ubuntu-latest
    name: Naming Consistency Check
    
    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Gradle
      uses: gradle/gradle-build-action@v3

    - name: Verify golden names haven't changed
      working-directory: ./acacia-plugin
      run: |
        ./gradlew :plugin:test --tests "com.acacia.mapping.HybridNamingEngineUnitTest.golden names are deterministic and never change"
        echo "✅ Golden names are consistent - no breaking changes detected"

    - name: Check for naming collisions
      working-directory: ./acacia-plugin
      run: |
        ./gradlew :plugin:test --tests "com.acacia.mapping.HybridNamingEngineUnitTest.algorithmic names are collision-free"
        echo "✅ No naming collisions detected"

  performance:
    runs-on: ubuntu-latest
    name: Performance Benchmarks
    
    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Gradle
      uses: gradle/gradle-build-action@v3

    - name: Run performance tests
      working-directory: ./acacia-plugin
      run: |
        ./gradlew :plugin:test --tests "com.acacia.generator.KotlinGeneratorTest.many functions - handles large input efficiently"
        echo "✅ Performance tests passed"
